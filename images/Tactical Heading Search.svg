  <title
     id="title">Tactical heading search projection diagram</title>
  <desc
     id="desc">A tactical heading search example. One friendly column and one enemy column are shown at their current positions. The friendly control root tests three projected directions: current heading, port 36 degrees, and starboard 36 degrees. The enemy column is projected once on its current heading. The starboard 36 degree friendly projection is selected as the best score.</desc>
